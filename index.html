<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Jaga IGD - RS Dian Husada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }

        .input-focus-ring:focus {
            border-color: #0ea5e9 !important;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        
        textarea {
            field-sizing: content; 
            min-height: 80px;
        }
        
        .large-area {
            min-height: 100px;
        }

        /* Indicator Sinkronisasi */
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Header & Controls -->
    <div class="fixed top-0 left-0 right-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-300 dark:border-slate-800 px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 flex items-center justify-center overflow-hidden rounded-xl bg-white dark:bg-slate-800 shadow-md border border-slate-300 dark:border-slate-700">
                    <img 
                        src="LOGO%20IGD.png" 
                        alt="Logo IGD" 
                        class="w-full h-full object-contain p-1"
                        onerror="this.src='https://img.icons8.com/fluency/96/hospital.png'"
                    />
                </div>
                <div>
                    <h1 class="font-extrabold text-sm md:text-base leading-none text-slate-900 dark:text-white flex items-center">
                        <span id="syncDot" class="sync-dot bg-slate-400"></span>
                        Laporan Jaga IGD
                    </h1>
                    <span class="text-[10px] uppercase tracking-wider font-bold text-slate-500">RS Dian Husada</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="darkToggle" class="p-2 rounded-lg bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 transition-all border border-slate-300 dark:border-slate-700 shadow-sm">
                    <span id="themeIcon" class="text-lg">🌙</span>
                </button>
                <button id="refreshBtn" class="flex items-center gap-2 px-3 py-2 rounded-lg bg-sky-600 hover:bg-sky-700 text-white text-sm font-bold transition-all shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    <span class="hidden sm:inline">Refresh</span>
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto pt-24 pb-20 px-4">
        <!-- Loader Awal -->
        <div id="initialLoader" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-sky-500 border-t-transparent"></div>
            <p class="mt-4 text-slate-500 font-bold">Menghubungkan Database...</p>
        </div>

        <div id="appUI" class="space-y-6 hidden">
            <!-- Data Umum -->
            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 p-6 transition-colors">
                <div class="flex items-center gap-2 mb-4 text-sky-600 dark:text-sky-400 font-bold uppercase text-xs tracking-widest">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Informasi Umum
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600 dark:text-slate-400 ml-1">Hari & Tanggal</label>
                        <input type="text" id="inputDate" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 focus:ring-2 focus:ring-sky-500/20 outline-none transition-all dark:text-white input-focus-ring" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-600 dark:text-slate-400 ml-1">Kota Pelaporan</label>
                        <input type="text" id="inputCity" value="Mojokerto" readonly class="w-full p-3 rounded-xl bg-slate-200 dark:bg-slate-900/50 border border-slate-300 dark:border-slate-700 text-slate-500 cursor-not-allowed" />
                    </div>
                </div>
            </section>

            <!-- Shifts Container (JS Generated) -->
            <div id="shiftsContainer" class="space-y-4"></div>

            <!-- Kendala -->
            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 p-6 transition-colors">
                <div class="flex items-center gap-2 mb-4 text-amber-600 dark:text-amber-500 font-bold uppercase text-xs tracking-widest">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                    Kendala / Masalah Operasional
                </div>
                <textarea id="inputKendala" rows="3" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 focus:ring-2 focus:ring-sky-500/20 outline-none transition-all placeholder:text-slate-400 dark:text-white input-focus-ring" placeholder="Tuliskan kendala hari ini..."></textarea>
            </section>

            <!-- Report Output -->
            <section class="bg-slate-900 dark:bg-black rounded-2xl shadow-2xl overflow-hidden border border-slate-800">
                <div class="px-6 py-4 bg-slate-800 dark:bg-slate-950 border-b border-slate-700 flex justify-between items-center">
                    <div class="flex items-center gap-2 text-white font-bold text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                        PREVIEW LAPORAN
                    </div>
                    <div id="validationBadge" class="px-2 py-0.5 rounded text-[10px] font-bold bg-red-500/20 text-red-400 border border-red-500/30">
                        DOKTER BELUM LENGKAP
                    </div>
                </div>
                <textarea id="outputReport" readonly class="w-full h-80 p-6 bg-transparent text-emerald-400 font-mono text-xs md:text-sm resize-none outline-none custom-scrollbar" spellcheck="false"></textarea>
                <div class="p-4 bg-slate-800 dark:bg-slate-950 flex flex-col gap-3">
                    <button id="copyBtn" disabled class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-700 disabled:opacity-50 text-white font-bold transition-all shadow-lg flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m-1 4h.01M9 16h.01" />
                        </svg>
                        Salin Laporan
                    </button>
                    <button id="resetTrigger" class="w-full py-2 text-slate-400 hover:text-red-500 text-xs font-bold transition-all uppercase tracking-widest">
                        Reset Semua Data di Cloud
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal Reset -->
    <div id="modalOverlay" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-sm p-6 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="modalContent">
            <h3 class="text-xl font-bold text-center mb-2 text-slate-800 dark:text-white">Hapus Data Cloud?</h3>
            <p class="text-slate-500 dark:text-slate-400 text-center text-sm mb-6">Seluruh data laporan ini akan dihapus dari semua perangkat secara permanen.</p>
            <div class="flex gap-3">
                <button id="cancelReset" class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 font-bold text-sm dark:text-white">Batal</button>
                <button id="confirmReset" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-sm shadow-lg shadow-red-500/20">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-slate-800 text-white rounded-2xl shadow-2xl font-bold text-sm flex items-center gap-3 translate-y-20 transition-all duration-300 pointer-events-none">
        <span id="toastMsg">Laporan Disalin!</span>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBX4BETROyo2VacszXnZSpTIyfhh4lwjKg",
            authDomain: "laporan-harian-igd.firebaseapp.com",
            databaseURL: "https://laporan-harian-igd-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "laporan-harian-igd",
            storageBucket: "laporan-harian-igd.firebasestorage.app",
            messagingSenderId: "105675683087",
            appId: "1:105675683087:web:fc853158e7489713f3fa7a"
        };

        const SHIFTS_CONFIG = [
            { id: 'Pagi1', label: 'Dini Hari', time: '00.00 - 07.00', icon: '🌑', color: 'from-slate-600 to-slate-400' },
            { id: 'Pagi2', label: 'Shift Pagi', time: '07.00 - 14.00', icon: '☀️', color: 'from-sky-600 to-sky-400' },
            { id: 'Siang', label: 'Shift Siang', time: '14.00 - 21.00', icon: '🌤️', color: 'from-amber-600 to-amber-400' },
            { id: 'Malam', label: 'Shift Malam', time: '21.00 - 00.00', icon: '🌙', color: 'from-indigo-600 to-indigo-400' }
        ];

        const DOCTORS_LIST = [
            "dr. Sukresno Tjahjo W., M.Kes", "dr. Felicia Putri Hartono", 
            "dr. Syntia Desy Arisandi", "dr. Imam Fadli", 
            "dr. Deo Sanjaya", "dr. Evva Mardiyana", 
            "dr. Farah Shania", "dr. Ratna Dewi"
        ];

        const SOURCES = [
            { id: 'pkm', label: 'Rujukan PKM' },
            { id: 'rujuk', label: 'Bawa Surat Rujukan' },
            { id: 'lab', label: 'Bawa Hasil Lab' },
            { id: 'desa', label: 'Diantar Siaga Desa' },
            { id: 'sendiri', label: 'Datang Sendiri' }
        ];

        // UI HELPERS
        const $ = (id) => document.getElementById(id);
        const getVal = (id) => $(id) ? $(id).value : '';
        const getNum = (id) => parseInt(getVal(id)) || 0;

        // INIT FIREBASE
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const dbPath = ref(db, 'reports/current_report');
        let syncTimer;

        // RENDER SHIFT BLOCKS
        function renderShifts() {
            const container = $('shiftsContainer');
            let html = '';
            SHIFTS_CONFIG.forEach(shift => {
                html += `
                <div class="shift-block bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 overflow-hidden transition-colors">
                    <button type="button" onclick="window.toggleShift('${shift.id}')" class="w-full flex items-center justify-between p-4 bg-gradient-to-r ${shift.color} text-white transition-all active:scale-[0.98] shadow-inner">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${shift.icon}</span>
                            <div class="text-left">
                                <h3 class="font-extrabold text-sm leading-none">${shift.label}</h3>
                                <span class="text-[10px] opacity-90 uppercase font-bold tracking-wider">${shift.time}</span>
                            </div>
                        </div>
                        <svg id="icon-${shift.id}" class="w-5 h-5 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    
                    <div id="content-${shift.id}" class="hidden p-6 space-y-6 animate-slide-in">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Dokter Jaga</label>
                            <div class="flex gap-2">
                                <select id="dr-${shift.id}" class="flex-1 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm dark:text-white input-focus-ring">
                                    <option value="">-- Pilih Dokter --</option>
                                    ${DOCTORS_LIST.map(d => `<option value="${d}">${d}</option>`).join('')}
                                </select>
                                <input type="text" id="drExtra-${shift.id}" placeholder="Pengganti" class="w-1/3 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm dark:text-white input-focus-ring" />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-sky-100/50 dark:bg-sky-900/20 rounded-xl border border-sky-200 dark:border-sky-800">
                                <div class="text-[10px] font-bold text-sky-600 dark:text-sky-400 uppercase tracking-tighter">Total Pasien</div>
                                <input type="text" id="summaryTotal-${shift.id}" value="0" readonly class="bg-transparent font-extrabold text-xl outline-none dark:text-sky-400 text-sky-700" />
                            </div>
                            <div class="p-3 bg-emerald-100/50 dark:bg-emerald-900/20 rounded-xl border border-emerald-200 dark:border-emerald-800">
                                <div class="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-tighter">Rawat Inap (MRS)</div>
                                <input type="text" id="summaryMrs-${shift.id}" value="0" readonly class="bg-transparent font-extrabold text-xl outline-none dark:text-emerald-400 text-emerald-700" />
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Rincian Kedatangan</div>
                            <div class="grid grid-cols-1 gap-4 bg-slate-100 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-300 dark:border-slate-700 transition-colors shadow-inner">
                                ${SOURCES.map(src => `
                                    <div class="flex items-center gap-4">
                                        <div class="flex-1 text-xs font-bold text-slate-600 dark:text-slate-400">${src.label}</div>
                                        <div class="flex gap-2">
                                            <div class="relative w-24">
                                                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-500 font-extrabold uppercase pointer-events-none">MRS</span>
                                                <input type="number" id="${src.id}RI-${shift.id}" value="0" min="0" class="w-full pl-11 pr-2 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-xs font-bold dark:text-white input-focus-ring" />
                                            </div>
                                            <div class="relative w-20">
                                                <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-500 font-extrabold uppercase pointer-events-none">RJ</span>
                                                <input type="number" id="${src.id}RJ-${shift.id}" value="0" min="0" class="w-full pl-8 pr-2 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 text-xs font-bold dark:text-white input-focus-ring" />
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Pasien BPJS</label>
                                <input type="number" id="bpjs-${shift.id}" value="0" min="0" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm font-bold dark:text-white input-focus-ring" />
                            </div>
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-500 uppercase">Pasien UMUM</label>
                                <input type="number" id="umum-${shift.id}" value="0" min="0" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm font-bold dark:text-white input-focus-ring" />
                            </div>
                        </div>

                        <div class="space-y-3">
                            <textarea id="bpjsKet-${shift.id}" rows="3" placeholder="Ket BPJS: Nama - Diagnosa" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring large-area"></textarea>
                            <textarea id="umumKet-${shift.id}" rows="3" placeholder="Ket UMUM: Nama - Diagnosa" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring large-area"></textarea>
                        </div>

                        <div class="space-y-4 pt-4 border-t border-slate-200 dark:border-slate-700">
                             <div class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Status Akhir & Kasus Khusus</div>
                             <textarea id="doa-${shift.id}" placeholder="DOA: Nama - Jam" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring"></textarea>
                             <textarea id="meninggal-${shift.id}" placeholder="Meninggal: Nama - Diagnosa" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring"></textarea>
                             <textarea id="mcu-${shift.id}" placeholder="MCU: Jenis Pemeriksaan" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring"></textarea>
                             <textarea id="pkmRujukKet-${shift.id}" placeholder="Rujukan PKM: Nama PKM - Diagnosa" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring"></textarea>
                             <textarea id="rsLain-${shift.id}" placeholder="Rujuk RS Lain: Nama Pasien - RS Tujuan" class="w-full p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 text-xs outline-none dark:text-white input-focus-ring"></textarea>
                        </div>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
        }

        window.toggleShift = function(id) {
            const content = $(`content-${id}`);
            const icon = $(`icon-${id}`);
            const isHidden = content.classList.contains('hidden');
            
            SHIFTS_CONFIG.forEach(s => {
                $(`content-${s.id}`).classList.add('hidden');
                $(`icon-${s.id}`).classList.remove('rotate-180');
            });

            if (isHidden) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
                content.parentElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // MAIN LOGIC
        function processData() {
            let totalAll = 0;
            let reportText = `LAPORAN JAGA IGD\n\n${getVal('inputCity')}, ${getVal('inputDate')} Jam 00.00\n\n`;
            let summaryBlock = '';
            let detailsBlock = '';
            let missingDoctors = [];

            SHIFTS_CONFIG.forEach(shift => {
                const sId = shift.id;
                const drSel = getVal(`dr-${sId}`);
                const drExt = getVal(`drExtra-${sId}`);
                const drFinal = (drSel && drExt) ? `${drSel} (${drExt})` : (drSel || drExt || '');
                if (!drFinal) missingDoctors.push(shift.label);

                let shiftMRS = 0, shiftRJ = 0, sourcesText = '';
                SOURCES.forEach(src => {
                    const ri = getNum(`${src.id}RI-${sId}`);
                    const rj = getNum(`${src.id}RJ-${sId}`);
                    shiftMRS += ri; shiftRJ += rj;
                    sourcesText += `-${src.label}:\n\u2022 Rawat inap : ${ri}\n\u2022 Rawat jalan : ${rj}\n`;
                });

                const shiftTotal = shiftMRS + shiftRJ;
                totalAll += shiftTotal;

                if ($(`summaryTotal-${sId}`)) $(`summaryTotal-${sId}`).value = shiftTotal;
                if ($(`summaryMrs-${sId}`)) $(`summaryMrs-${sId}`).value = shiftMRS;

                summaryBlock += `${shift.label.padEnd(12)}: ${shiftTotal} px, MRS: ${shiftMRS}\n`;
                detailsBlock += `${shift.label}\nJam ${shift.time} Wib\nDokter jaga : ${drFinal || '-'}\nTotal kunjungan : ${shiftTotal}\nTotal rawat inap : ${shiftMRS}\n\nKeterangan :\nPasien BPJS : ${getNum(`bpjs-${sId}`)}\nPasien Umum : ${getNum(`umum-${sId}`)}\nPasien Rawat jalan : ${shiftRJ}\n\nRincian jumlah pasien datang:\n${sourcesText}\nRINCIAN STATUS AKHIR\nDOA : ${getVal(`doa-${sId}`) || '-'}\nMeninggal : ${getVal(`meninggal-${sId}`) || '-'}\nMCU : ${getVal(`mcu-${sId}`) || '-'}\nRujukan PKM : ${getVal(`pkmRujukKet-${sId}`) || '-'}\nRujuk RS Lain : ${getVal(`rsLain-${sId}`) || '-'}\n-------------------------------\n\n`;
            });

            // Validation
            if (missingDoctors.length > 0) {
                $('validationBadge').textContent = "DOKTER BELUM LENGKAP";
                $('validationBadge').className = "px-2 py-0.5 rounded text-[10px] font-bold bg-red-500/20 text-red-400 border border-red-500/30";
                $('copyBtn').disabled = true;
            } else {
                $('validationBadge').textContent = "DATA LENGKAP";
                $('validationBadge').className = "px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
                $('copyBtn').disabled = false;
            }

            reportText += `TOTAL KUNJUNGAN IGD ${totalAll} PASIEN\n${summaryBlock}\n${detailsBlock}KENDALA: ${getVal('inputKendala') || '-'}\n\nTerima Kasih.`;
            $('outputReport').value = reportText;
            
            // Sync to Database
            pushToCloud();
        }

        function pushToCloud() {
            clearTimeout(syncTimer);
            syncTimer = setTimeout(async () => {
                const data = { theme: document.documentElement.classList.contains('dark') ? 'dark' : 'light' };
                document.querySelectorAll('input, select, textarea').forEach(el => {
                    if (el.id && el.id !== 'outputReport') data[el.id] = el.value;
                });
                try {
                    await set(dbPath, data);
                    $('syncDot').className = "sync-dot bg-emerald-500";
                } catch (e) {
                    $('syncDot').className = "sync-dot bg-red-500 animate-pulse";
                }
            }, 1000);
        }

        async function startApp() {
            renderShifts();
            try {
                await signInAnonymously(auth);
                $('syncDot').className = "sync-dot bg-emerald-500";
                
                onValue(dbPath, (snap) => {
                    $('initialLoader').classList.add('hidden');
                    $('appUI').classList.remove('hidden');
                    
                    if (snap.exists()) {
                        const data = snap.val();
                        Object.keys(data).forEach(id => {
                            const el = $(id);
                            if (el && document.activeElement !== el) el.value = data[id];
                        });
                        if (data.theme === 'dark') document.documentElement.classList.add('dark');
                    } else {
                        const now = new Date();
                        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                        $('inputDate').value = now.toLocaleDateString('id-ID', options);
                    }
                    processData();
                });
            } catch (err) {
                console.error("Auth error", err);
                $('syncDot').className = "sync-dot bg-red-500";
                $('initialLoader').classList.add('hidden');
                $('appUI').classList.remove('hidden');
            }
        }

        // Event Listeners
        document.body.addEventListener('input', (e) => {
            if (e.target.id && e.target.id !== 'outputReport') processData();
        });

        $('darkToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            $('themeIcon').textContent = isDark ? '☀️' : '🌙';
            pushToCloud();
        };

        $('copyBtn').onclick = () => {
            $('outputReport').select();
            document.execCommand('copy');
            $('toast').classList.remove('translate-y-20');
            setTimeout(() => $('toast').classList.add('translate-y-20'), 2000);
        };

        $('resetTrigger').onclick = () => {
            $('modalOverlay').classList.remove('hidden');
            setTimeout(() => $('modalContent').classList.remove('scale-95', 'opacity-0'), 10);
        };
        $('cancelReset').onclick = () => $('modalOverlay').classList.add('hidden');
        $('confirmReset').onclick = async () => {
            await remove(dbPath);
            window.location.reload();
        };

        $('refreshBtn').onclick = () => window.location.reload();

        startApp();
    </script>
</body>
</html>
