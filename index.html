<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laporan Jaga IGD - RS Dian Husada (Cloud Sync)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .input-focus-ring:focus { border-color: #0ea5e9 !important; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        textarea:not(#outputReport) { min-height: 80px; field-sizing: content; }
        .large-area { min-height: 100px; }

        @keyframes pulse-ring { 0% { transform: scale(.33); } 80%, 100% { opacity: 0; } }
        .dot-syncing { position: relative; }
        .dot-syncing::before {
            content: ''; position: absolute; width: 100%; height: 100%; background: inherit;
            border-radius: inherit; animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Header -->
    <div class="fixed top-0 left-0 right-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-b border-slate-300 dark:border-slate-800 px-4 py-3">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 flex items-center justify-center overflow-hidden rounded-xl bg-white dark:bg-slate-800 shadow-md border border-slate-300 dark:border-slate-700">
                    <img src="LOGO%20IGD.png" alt="Logo" class="w-full h-full object-contain p-1" onerror="this.src='https://img.icons8.com/fluency/96/hospital.png'"/>
                </div>
                <div>
                    <h1 class="font-extrabold text-sm md:text-base leading-none">Laporan Jaga IGD</h1>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] uppercase font-bold text-slate-500">RS Dian Husada</span>
                        <div id="cloudStatus" class="flex items-center gap-1.5 px-1.5 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700">
                            <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-slate-400"></div>
                            <span id="statusText" class="text-[8px] font-bold text-slate-500 uppercase">Connecting</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="darkToggle" class="p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 shadow-sm"><span id="themeIcon">🌙</span></button>
                <button id="refreshBtn" class="p-2 rounded-lg bg-sky-600 text-white shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto pt-24 pb-20 px-4">
        <div class="space-y-6">
            <!-- Informasi Umum -->
            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 ml-1">Tanggal Laporan</label>
                        <input type="date" id="inputDateDb" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none dark:text-white input-focus-ring" />
                        <input type="hidden" id="inputDate" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 ml-1">Kota</label>
                        <input type="text" id="inputCity" value="Mojokerto" readonly class="w-full p-3 rounded-xl bg-slate-200 dark:bg-slate-900/50 text-slate-500 cursor-not-allowed" />
                    </div>
                </div>
            </section>

            <div id="shiftsContainer" class="space-y-4"></div>

            <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 p-6">
                <label class="text-xs font-bold text-slate-500 uppercase block mb-2">Kendala Hari Ini</label>
                <textarea id="inputKendala" rows="3" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none dark:text-white input-focus-ring" placeholder="Tuliskan kendala..."></textarea>
            </section>

            <!-- Preview -->
            <section class="bg-slate-900 dark:bg-black rounded-2xl shadow-2xl overflow-hidden border border-slate-800">
                <div class="px-6 py-4 bg-slate-800 dark:bg-slate-950 border-b border-slate-700 flex justify-between items-center">
                    <span class="text-white font-bold text-sm">PREVIEW LAPORAN</span>
                    <div id="validationBadge" class="px-2 py-0.5 rounded text-[10px] font-bold bg-red-500/20 text-red-400">DOKTER BELUM LENGKAP</div>
                </div>
                <textarea id="outputReport" readonly class="w-full h-80 p-6 bg-transparent text-emerald-400 font-mono text-xs md:text-sm resize-none outline-none custom-scrollbar" spellcheck="false"></textarea>
                <div class="p-4 bg-slate-800 dark:bg-slate-950 flex flex-col gap-3">
                    <button id="copyBtn" disabled class="w-full py-3 rounded-xl bg-emerald-600 hover:bg-emerald-700 disabled:opacity-50 text-white font-bold transition-all shadow-lg flex items-center justify-center gap-2">Salin Laporan</button>
                    <button id="resetTrigger" class="text-slate-400 hover:text-red-500 text-xs font-bold uppercase py-2">Hapus Laporan Tanggal Ini</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Modals -->
    <div id="modalOverlay" class="fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white dark:bg-slate-800 rounded-3xl w-full max-w-sm p-6 shadow-2xl scale-95 opacity-0 transition-all duration-300" id="modalContent">
            <h3 class="text-xl font-bold text-center mb-2">Hapus Data?</h3>
            <p class="text-slate-500 text-center text-sm mb-6">Data laporan tanggal ini akan dihapus dari Cloud.</p>
            <div class="flex gap-3">
                <button id="cancelReset" class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-700 font-bold text-sm">Batal</button>
                <button id="confirmReset" class="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold text-sm">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 bg-slate-800 text-white rounded-2xl shadow-2xl font-bold text-sm translate-y-20 transition-all duration-300">Laporan Disalin!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIG - PRIORITASKAN GLOBAL DARI ENVIRONMENT
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'laporan-harian-igd-shared';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SHIFTS_CONFIG = [
            { id: 'Pagi1', label: 'Dini Hari', time: '00.00 - 07.00', icon: '🌑', color: 'from-slate-600 to-slate-400' },
            { id: 'Pagi2', label: 'Shift Pagi', time: '07.00 - 14.00', icon: '☀️', color: 'from-sky-600 to-sky-400' },
            { id: 'Siang', label: 'Shift Siang', time: '14.00 - 21.00', icon: '🌤️', color: 'from-amber-600 to-amber-400' },
            { id: 'Malam', label: 'Shift Malam', time: '21.00 - 00.00', icon: '🌙', color: 'from-indigo-600 to-indigo-400' }
        ];

        const DOCTORS_LIST = ["dr. Sukresno Tjahjo W., M.Kes", "dr. Felicia Putri Hartono", "dr. Syntia Desy Arisandi", "dr. Imam Fadli", "dr. Deo Sanjaya", "dr. Evva Mardiyana", "dr. Farah Shania", "dr. Ratna Dewi"];
        const SOURCES = [{ id: 'pkm', label: 'Rujukan PKM' }, { id: 'rujuk', label: 'Bawa Surat Rujukan' }, { id: 'lab', label: 'Bawa Hasil Lab' }, { id: 'desa', label: 'Diantar Siaga Desa' }, { id: 'sendiri', label: 'Datang Sendiri' }];

        const $ = (id) => document.getElementById(id);
        const getVal = (id) => $(id) ? $(id).value : '';
        const getNum = (id) => parseInt(getVal(id)) || 0;

        let currentUser = null;
        let activeUnsubscribe = null;
        let isSyncingFromCloud = false;
        let syncTimeout = null;

        function renderShifts() {
            const container = $('shiftsContainer');
            if (!container) return;
            let html = '';
            SHIFTS_CONFIG.forEach(shift => {
                html += `
                <div class="shift-block bg-white dark:bg-slate-800 rounded-2xl shadow-md border border-slate-300 dark:border-slate-700 overflow-hidden">
                    <button type="button" data-shift-id="${shift.id}" class="shift-toggle w-full flex items-center justify-between p-4 bg-gradient-to-r ${shift.color} text-white">
                        <div class="flex items-center gap-3">
                            <span class="text-xl">${shift.icon}</span>
                            <div class="text-left">
                                <h3 class="font-extrabold text-sm leading-none">${shift.label}</h3>
                                <span class="text-[10px] opacity-90 uppercase font-bold">${shift.time}</span>
                            </div>
                        </div>
                        <svg id="icon-${shift.id}" class="w-5 h-5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="content-${shift.id}" class="hidden p-6 space-y-6">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">Dokter Jaga</label>
                            <div class="flex gap-2">
                                <select id="dr-${shift.id}" class="flex-1 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm dark:text-white">
                                    <option value="">-- Pilih Dokter --</option>
                                    ${DOCTORS_LIST.map(d => `<option value="${d}">${d}</option>`).join('')}
                                </select>
                                <input type="text" id="drExtra-${shift.id}" placeholder="Pengganti" class="w-1/3 p-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 outline-none text-sm dark:text-white" />
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="p-3 bg-sky-100/50 dark:bg-sky-900/20 rounded-xl border border-sky-200">
                                <div class="text-[10px] font-bold text-sky-600 uppercase">Total Pasien</div>
                                <input type="text" id="summaryTotal-${shift.id}" value="0" readonly class="bg-transparent font-extrabold text-xl outline-none" />
                            </div>
                            <div class="p-3 bg-emerald-100/50 dark:bg-emerald-900/20 rounded-xl border border-emerald-200">
                                <div class="text-[10px] font-bold text-emerald-600 uppercase">Rawat Inap</div>
                                <input type="text" id="summaryMrs-${shift.id}" value="0" readonly class="bg-transparent font-extrabold text-xl outline-none" />
                            </div>
                        </div>
                        <div class="space-y-3">
                            <div class="grid grid-cols-1 gap-4 bg-slate-100 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-300 dark:border-slate-700">
                                ${SOURCES.map(src => `
                                    <div class="flex items-center gap-4">
                                        <div class="flex-1 text-xs font-bold text-slate-600 dark:text-slate-400">${src.label}</div>
                                        <div class="flex gap-2">
                                            <input type="number" id="${src.id}RI-${shift.id}" value="0" class="w-16 p-2 rounded-lg bg-white dark:bg-slate-800 border text-xs font-bold" placeholder="RI" />
                                            <input type="number" id="${src.id}RJ-${shift.id}" value="0" class="w-16 p-2 rounded-lg bg-white dark:bg-slate-800 border text-xs font-bold" placeholder="RJ" />
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="bpjs-${shift.id}" value="0" class="p-3 rounded-xl border bg-white dark:bg-slate-900 text-sm font-bold" placeholder="BPJS" />
                            <input type="number" id="umum-${shift.id}" value="0" class="p-3 rounded-xl border bg-white dark:bg-slate-900 text-sm font-bold" placeholder="UMUM" />
                        </div>
                        <div class="space-y-3">
                            <textarea id="bpjsKet-${shift.id}" placeholder="Ket BPJS: Nama - Diagnosa" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs outline-none large-area"></textarea>
                            <textarea id="umumKet-${shift.id}" placeholder="Ket UMUM: Nama - Diagnosa" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs outline-none large-area"></textarea>
                        </div>
                        <div class="space-y-2 border-t pt-4">
                             <textarea id="doa-${shift.id}" placeholder="DOA: Nama - Jam" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs mb-2"></textarea>
                             <textarea id="meninggal-${shift.id}" placeholder="Meninggal: Nama - Diagnosa" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs mb-2"></textarea>
                             <textarea id="mcu-${shift.id}" placeholder="MCU: Jenis Pemeriksaan" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs mb-2"></textarea>
                             <textarea id="pkmRujukKet-${shift.id}" placeholder="Rujukan PKM: Nama PKM - Diagnosa" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs mb-2"></textarea>
                             <textarea id="rsLain-${shift.id}" placeholder="Rujuk RS Lain: Nama - RS Tujuan" class="w-full p-3 rounded-xl border bg-white dark:bg-slate-900 text-xs"></textarea>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.shift-toggle').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-shift-id');
                    const content = $(`content-${id}`);
                    const icon = $(`icon-${id}`);
                    const isHidden = content.classList.contains('hidden');
                    document.querySelectorAll('[id^="content-"]').forEach(c => c.classList.add('hidden'));
                    document.querySelectorAll('[id^="icon-"]').forEach(i => i.classList.remove('rotate-180'));
                    if (isHidden) { content.classList.remove('hidden'); icon.classList.add('rotate-180'); btn.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
                }
            });
        }

        function generateReport() {
            let totalAll = 0;
            const friendlyDate = getVal('inputDate') || '...';
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + '.' + now.getMinutes().toString().padStart(2, '0');
            let reportText = `LAPORAN JAGA IGD\n\n${getVal('inputCity')}, ${friendlyDate} Jam ${timeStr}\n\n`;
            let summaryBlock = '';
            let detailsBlock = '';
            let missingDoctors = [];

            SHIFTS_CONFIG.forEach(shift => {
                const sId = shift.id;
                const drFinal = (getVal(`dr-${sId}`) && getVal(`drExtra-${sId}`)) ? `${getVal(`dr-${sId}`)} (${getVal(`drExtra-${sId}`)})` : (getVal(`dr-${sId}`) || getVal(`drExtra-${sId}`) || '');
                if (!drFinal) missingDoctors.push(shift.label);

                let shiftMRS = 0, shiftRJ = 0, sourcesText = '';
                SOURCES.forEach(src => {
                    const ri = getNum(`${src.id}RI-${sId}`), rj = getNum(`${src.id}RJ-${sId}`);
                    shiftMRS += ri; shiftRJ += rj;
                    sourcesText += `-${src.label}:\n\u2022 Rawat inap : ${ri}\n\u2022 Rawat jalan : ${rj}\n`;
                });

                const shiftTotal = shiftMRS + shiftRJ;
                totalAll += shiftTotal;
                if ($(`summaryTotal-${sId}`)) $(`summaryTotal-${sId}`).value = shiftTotal;
                if ($(`summaryMrs-${sId}`)) $(`summaryMrs-${sId}`).value = shiftMRS;

                summaryBlock += `${shift.label.padEnd(12)}: ${shiftTotal} px, MRS: ${shiftMRS}\n`;
                detailsBlock += `${shift.label}\nJam ${shift.time} Wib\nDokter jaga : ${drFinal || '-'}\nTotal kunjungan : ${shiftTotal}\nTotal rawat inap : ${shiftMRS}\n\nKeterangan :\nPasien BPJS : ${getNum(`bpjs-${sId}`)}\nPasien Umum : ${getNum(`umum-${sId}`)}\nPasien Rawat jalan : ${shiftRJ}\n\nRincian jumlah pasien yang datang:\n${sourcesText}\nRINCIAN KASUS RAWAT JALAN\nBPJS:\n${getVal(`bpjsKet-${sId}`) || '- Tidak ada'}\n\nUMUM:\n${getVal(`umumKet-${sId}`) || '- Tidak ada'}\n\nRINCIAN STATUS AKHIR\nDOA (Death On Arrival) :\n${getVal(`doa-${sId}`) || '-'}\nMeninggal di IGD :\n${getVal(`meninggal-${sId}`) || '-'}\nMCU (Medical Check Up) :\n${getVal(`mcu-${sId}`) || '-'}\nRujukan dari Puskesmas :\n${getVal(`pkmRujukKet-${sId}`) || '-'}\nRujuk ke Rumah Sakit Lain :\n${getVal(`rsLain-${sId}`) || '-'}\nCovid Rawat Jalan: -\n\n-------------------------------\n\n`;
            });

            if ($('validationBadge')) {
                $('validationBadge').textContent = missingDoctors.length ? "DOKTER BELUM LENGKAP" : "DATA LENGKAP";
                $('validationBadge').className = `px-2 py-0.5 rounded text-[10px] font-bold ${missingDoctors.length ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}`;
            }
            if ($('copyBtn')) $('copyBtn').disabled = missingDoctors.length > 0;

            reportText += `TOTAL KUNJUNGAN IGD ${totalAll} PASIEN\n${summaryBlock}\n${detailsBlock}KENDALA / MASALAH HARI INI:\n${getVal('inputKendala') || '-'}\n\nTerima Kasih.`;
            if ($('outputReport')) $('outputReport').value = reportText;
        }

        async function syncToCloud() {
            if (!currentUser || isSyncingFromCloud) return;
            const dateId = $('inputDateDb').value;
            if (!dateId) return;
            setSyncStatus('syncing');
            const data = {};
            document.querySelectorAll('input, select, textarea').forEach(el => { if (el.id && el.id !== 'outputReport') data[el.id] = el.value; });
            try {
                // RULE 1: /artifacts/{appId}/public/data/{collectionName}
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', dateId), data, { merge: true });
                setSyncStatus('saved');
            } catch (err) { setSyncStatus('error'); }
        }

        function setSyncStatus(status) {
            const dot = $('statusDot'), text = $('statusText');
            if (!dot || !text) return;
            dot.classList.remove('bg-emerald-500', 'bg-amber-500', 'bg-red-500', 'dot-syncing', 'bg-slate-400');
            if (status === 'syncing') { dot.classList.add('bg-amber-500', 'dot-syncing'); text.innerText = 'Syncing'; }
            else if (status === 'saved') { dot.classList.add('bg-emerald-500'); text.innerText = 'Synced'; }
            else if (status === 'error') { dot.classList.add('bg-red-500'); text.innerText = 'Error'; }
        }

        function listenToCloud(dateId) {
            if (activeUnsubscribe) activeUnsubscribe();
            if (!currentUser || !dateId) return;
            setSyncStatus('syncing');
            activeUnsubscribe = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'reports', dateId), (snapshot) => {
                isSyncingFromCloud = true;
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    Object.keys(data).forEach(id => {
                        const el = $(id);
                        if (el && id !== 'inputDateDb' && id !== 'inputCity' && el.value !== data[id]) el.value = data[id];
                    });
                } else {
                    document.querySelectorAll('input:not(#inputDateDb):not(#inputCity):not(#inputDate), select, textarea:not(#outputReport)').forEach(el => { if (el.type === 'number') el.value = 0; else el.value = ''; });
                }
                generateReport();
                isSyncingFromCloud = false;
                setSyncStatus('saved');
            }, (error) => setSyncStatus('error'));
        }

        window.onload = async () => {
            renderShifts();
            const now = new Date(), offset = now.getTimezoneOffset();
            const localDateStr = new Date(now.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
            $('inputDateDb').value = localDateStr;
            updateFriendlyDate(localDateStr);
            generateReport();

            // RULE 3: Auth first
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (err) { setSyncStatus('error'); }

            onAuthStateChanged(auth, (user) => {
                currentUser = user;
                if (user) listenToCloud($('inputDateDb').value);
            });

            document.body.addEventListener('input', (e) => {
                const el = e.target;
                if (['INPUT', 'SELECT', 'TEXTAREA'].includes(el.tagName)) {
                    if (el.id === 'inputDateDb') { updateFriendlyDate(el.value); listenToCloud(el.value); return; }
                    generateReport();
                    if (!isSyncingFromCloud) { clearTimeout(syncTimeout); setSyncStatus('syncing'); syncTimeout = setTimeout(syncToCloud, 1000); }
                }
            });

            if ($('darkToggle')) $('darkToggle').onclick = () => {
                document.documentElement.classList.toggle('dark');
                const isDark = document.documentElement.classList.contains('dark');
                $('themeIcon').textContent = isDark ? '☀️' : '🌙';
                localStorage.setItem('rsdh_theme', isDark ? 'dark' : 'light');
            };
            if (localStorage.getItem('rsdh_theme') === 'dark') { document.documentElement.classList.add('dark'); if($('themeIcon')) $('themeIcon').textContent = '☀️'; }

            if ($('copyBtn')) $('copyBtn').onclick = () => { $('outputReport').select(); document.execCommand('copy'); showToast('Laporan Disalin!'); };
            if ($('refreshBtn')) $('refreshBtn').onclick = () => window.location.reload();
            if ($('resetTrigger')) $('resetTrigger').onclick = () => toggleModal(true);
            if ($('cancelReset')) $('cancelReset').onclick = () => toggleModal(false);
            if ($('confirmReset')) $('confirmReset').onclick = async () => {
                const dateId = $('inputDateDb').value;
                if (dateId && currentUser) { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'reports', dateId)); window.location.reload(); }
            };
        };

        function updateFriendlyDate(isoDate) {
            if (!isoDate) return;
            const dateObj = new Date(isoDate);
            $('inputDate').value = dateObj.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function showToast(msg) {
            const toast = $('toast');
            toast.innerText = msg;
            toast.classList.remove('translate-y-20');
            setTimeout(() => toast.classList.add('translate-y-20'), 3000);
        }

        function toggleModal(show) {
            const overlay = $('modalOverlay'), content = $('modalContent');
            if (show) { overlay.classList.remove('hidden'); setTimeout(() => content.classList.remove('scale-95', 'opacity-0'), 10); }
            else { content.classList.add('scale-95', 'opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300); }
        }
    </script>
</body>
</html>
